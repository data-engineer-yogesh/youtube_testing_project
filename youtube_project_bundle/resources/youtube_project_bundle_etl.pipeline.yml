# The main pipeline for youtube_project_bundle

resources:
  pipelines:
    youtube_project_bundle_etl:
      name: youtube_project_bundle_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/youtube_project_bundle_etl"

      libraries:
        - glob:
            include: ../src/youtube_project_bundle_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
